version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flask_user
      POSTGRES_PASSWORD: flask_pass
      POSTGRES_DB: flask_app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://flask_user:flask_pass@db:5432/flask_app
      - SECRET_KEY=change-me-in-production
      - FLASK_CONFIG=config.ProductionConfig
    depends_on:
      - db
    command: >
      sh -c "flask db upgrade && gunicorn wsgi:app --bind 0.0.0.0:8000 --workers 2"
    restart: unless-stopped

volumes:
  pgdata:
