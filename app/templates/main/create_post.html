{% extends "base.html" %}

{% block title %}New Post — Flask Web App{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Create New Post</h1>
</div>

<form method="POST" class="form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="form-group">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" required maxlength="300"
               value="{{ request.form.get('title', '') }}">
    </div>

    <div class="form-group">
        <label for="category_id">Category</label>
        <select id="category_id" name="category_id">
            <option value="">-- No Category --</option>
            {% for cat in categories %}
            <option value="{{ cat.id }}" {% if request.form.get('category_id') == cat.id|string %}selected{% endif %}>{{ cat.name }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <label for="body">Content</label>
        <textarea id="body" name="body" rows="12" required>{{ request.form.get('body', '') }}</textarea>
    </div>

    <div class="form-group">
        <label class="checkbox-label">
            <input type="checkbox" name="is_published" value="1"
                   {% if request.form.get('is_published') %}checked{% endif %}>
            Publish immediately
        </label>
    </div>

    <button type="submit" class="btn btn-primary">Create Post</button>
    <a href="{{ url_for('main.dashboard') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
