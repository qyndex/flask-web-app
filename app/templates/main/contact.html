{% extends "base.html" %}

{% block title %}Contact — Flask Web App{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Contact Us</h1>
</div>

<form method="POST" class="form" style="max-width: 600px;">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required maxlength="100"
               value="{{ request.form.get('name', '') }}">
    </div>

    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required maxlength="120"
               value="{{ request.form.get('email', '') }}">
    </div>

    <div class="form-group">
        <label for="subject">Subject</label>
        <input type="text" id="subject" name="subject" required maxlength="200"
               value="{{ request.form.get('subject', '') }}">
    </div>

    <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" required>{{ request.form.get('message', '') }}</textarea>
    </div>

    <button type="submit" class="btn btn-primary">Send Message</button>
</form>
{% endblock %}
