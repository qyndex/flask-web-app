{% extends "base.html" %}

{% block title %}Register — Flask Web App{% endblock %}

{% block content %}
<div class="auth-container">
    <h1>Register</h1>
    <form method="POST" action="{{ url_for('auth.register_post') }}" class="form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required minlength="3" maxlength="80"
                   value="{{ request.form.get('username', '') }}">
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required maxlength="120"
                   value="{{ request.form.get('email', '') }}">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required minlength="6">
        </div>

        <button type="submit" class="btn btn-primary">Register</button>
    </form>
    <p class="auth-link">Already have an account? <a href="{{ url_for('auth.login') }}">Login</a></p>
</div>
{% endblock %}
